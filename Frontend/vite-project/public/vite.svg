<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">FolkMint Mini Logo</title>
  <desc id="desc">A compact geometric gold emblem based on the FolkMint home page hero logo.</desc>
  <defs>
    <linearGradient id="goldFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0BC4A"/>
      <stop offset="55%" stop-color="#C4922A"/>
      <stop offset="100%" stop-color="#936606"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#FFFDF8"/>

  <g transform="translate(32 32)">
    <path d="M0 -24 L24 0 L0 24 L-24 0 Z" fill="none" stroke="url(#goldFill)" stroke-width="2.6"/>
    <path d="M0 -14 L14 0 L0 14 L-14 0 Z" fill="url(#goldFill)" opacity="0.18"/>

    <line x1="0" y1="-24" x2="0" y2="24" stroke="#C4922A" stroke-width="1.1" opacity="0.35"/>
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#C4922A" stroke-width="1.1" opacity="0.35"/>
    <line x1="-17" y1="-17" x2="17" y2="17" stroke="#C4922A" stroke-width="0.9" opacity="0.22"/>
    <line x1="-17" y1="17" x2="17" y2="-17" stroke="#C4922A" stroke-width="0.9" opacity="0.22"/>

    <circle cx="0" cy="0" r="7" fill="url(#goldFill)"/>
    <circle cx="0" cy="0" r="3.1" fill="#111111"/>

    <circle cx="0" cy="-16" r="2.3" fill="#C4922A"/>
    <circle cx="16" cy="0" r="2.3" fill="#C4922A"/>
    <circle cx="0" cy="16" r="2.3" fill="#C4922A"/>
    <circle cx="-16" cy="0" r="2.3" fill="#C4922A"/>

    <circle cx="-12.5" cy="-12.5" r="1.6" fill="#C4922A" opacity="0.55"/>
    <circle cx="12.5" cy="-12.5" r="1.6" fill="#C4922A" opacity="0.55"/>
    <circle cx="12.5" cy="12.5" r="1.6" fill="#C4922A" opacity="0.55"/>
    <circle cx="-12.5" cy="12.5" r="1.6" fill="#C4922A" opacity="0.55"/>
  </g>
</svg>
